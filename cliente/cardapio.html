<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cardápio Digital</title>
  <meta name="description" content="Cardápio digital — faça seu pedido pelo celular">
  <meta name="theme-color" content="#e63946">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/cardapio.css">
</head>
<body>
  <!-- Loading inicial -->
  <div id="initialLoading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px">
    <div style="font-size:3rem">🍽️</div>
    <div class="spinner"></div>
    <p style="color:var(--text-secondary)">Carregando cardápio...</p>
  </div>

  <!-- Layout principal (oculto até carregar) -->
  <div class="cardapio-layout hidden" id="cardapioLayout">
    <!-- Header -->
    <header class="cardapio-header">
      <div class="cardapio-header-top">
        <img id="restLogo" class="cardapio-logo" style="display:none" alt="Logo">
        <div class="cardapio-logo-placeholder" id="restLogoPlaceholder">🍽️</div>
        <div class="cardapio-info">
          <h1 id="restNome">Carregando...</h1>
          <p id="restEndereco"></p>
        </div>
      </div>
      <!-- Barra de categorias -->
      <div class="categories-bar">
        <div class="categories-list" id="categoriesList">
          <button class="category-chip active" data-cat="todos" onclick="filterByCategory('todos', this)">
            🍽️ Todos
          </button>
        </div>
      </div>
    </header>

    <!-- Conteúdo do cardápio -->
    <main id="menuContent" style="padding-bottom:20px">
      <!-- Produtos serão renderizados aqui -->
    </main>
  </div>

  <!-- Botão flutuante do carrinho -->
  <button class="cart-fab hidden" id="cartFab" onclick="openCart()">
    <span>🛒 Meu Pedido</span>
    <span class="cart-fab-count" id="cartFabCount">0</span>
    <span class="cart-fab-total" id="cartFabTotal">R$ 0,00</span>
  </button>

  <!-- Drawer do Carrinho -->
  <div class="cart-drawer hidden" id="cartDrawer">
    <div class="cart-drawer-overlay" onclick="closeCart()"></div>
    <div class="cart-drawer-content">
      <div class="cart-handle"></div>

      <!-- Estado: Carrinho vazio -->
      <div id="cartEmpty" style="padding:40px 20px;text-align:center">
        <div style="font-size:3rem;margin-bottom:12px">🛒</div>
        <h3>Carrinho vazio</h3>
        <p class="text-muted text-sm mt-1">Adicione itens do cardápio</p>
        <button class="btn btn-primary mt-2" onclick="closeCart()">Ver Cardápio</button>
      </div>

      <!-- Estado: Carrinho com itens -->
      <div id="cartWithItems" class="hidden">
        <div class="cart-header">
          <h2>🛒 Meu Pedido</h2>
          <button class="cart-close" onclick="closeCart()">✕</button>
        </div>

        <div class="cart-items" id="cartItemsList"></div>

        <div class="cart-checkout">
          <!-- Observação -->
          <div class="cart-obs">
            <label class="form-label" style="font-size:0.8rem;margin-bottom:6px">📝 Observações (opcional)</label>
            <textarea id="cartObs" placeholder="Ex: sem cebola, ponto da carne, alergias..."></textarea>
          </div>

          <!-- Mesa -->
          <div class="form-group">
            <label class="form-label">🍽️ Número da Mesa *</label>
            <input type="number" class="form-control" id="mesaInput" placeholder="Ex: 5" min="1" max="999" required
              style="font-size:1.2rem;font-weight:700;text-align:center">
          </div>

          <!-- Total -->
          <div class="cart-total-row">
            <span class="cart-total-label">Total do Pedido</span>
            <span class="cart-total-value" id="cartTotal">R$ 0,00</span>
          </div>

          <button class="btn btn-primary btn-full btn-lg" onclick="finalizarPedido()" id="finalizarBtn">
            ✅ Fazer Pedido
          </button>
        </div>
      </div>

      <!-- Estado: Pedido enviado -->
      <div id="cartSuccess" class="hidden">
        <div class="order-success">
          <div class="success-icon">🎉</div>
          <h2>Pedido Enviado!</h2>
          <p class="text-muted mt-1">Seu pedido foi recebido com sucesso.</p>
          <div style="background:var(--bg);border-radius:12px;padding:16px;margin:20px 0;text-align:left">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <span class="text-muted text-sm">Mesa</span>
              <strong id="successMesa">—</strong>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <span class="text-muted text-sm">Total</span>
              <strong id="successTotal" class="text-primary-color">—</strong>
            </div>
            <div style="display:flex;justify-content:space-between">
              <span class="text-muted text-sm">Status</span>
              <span class="badge badge-warning">⏳ Aguardando preparo</span>
            </div>
          </div>
          <p class="text-muted text-sm">Acompanhe o status do seu pedido com o garçom.</p>
          <button class="btn btn-primary mt-3 btn-full" onclick="resetCart()">
            🍽️ Fazer Novo Pedido
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de produto (detalhes) -->
  <div class="modal-overlay hidden" id="productDetailModal">
    <div class="modal" style="max-width:420px">
      <img id="detailImage" style="width:100%;height:200px;object-fit:cover;display:none" alt="">
      <div class="modal-body">
        <h3 id="detailName" style="font-size:1.2rem;margin-bottom:8px"></h3>
        <p id="detailDesc" class="text-muted text-sm" style="margin-bottom:12px"></p>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span id="detailPrice" style="font-size:1.4rem;font-weight:800;color:var(--primary)"></span>
          <div style="display:flex;align-items:center;gap:12px">
            <button class="qty-btn minus" onclick="changeDetailQty(-1)">−</button>
            <span id="detailQty" class="qty-value fw-bold" style="font-size:1.1rem">1</span>
            <button class="qty-btn" onclick="changeDetailQty(1)">+</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeProductDetail()">Fechar</button>
        <button class="btn btn-primary" id="addToCartBtn" onclick="addFromDetail()">
          🛒 Adicionar — <span id="detailTotalPrice"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>

  <script>
    // ============================================================
    // CARDÁPIO DO CLIENTE
    // ============================================================

    let restaurantId = null;
    let estabelecimento = {};
    let allProducts = [];
    let allCategories = [];
    let cart = [];
    let currentCategoryFilter = 'todos';
    let detailProduct = null;
    let detailQty = 1;

    // Obter ID do restaurante da URL
    function getRestaurantId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // Formatar preço
    function formatPrice(value) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
    }

    // Inicializar cardápio
    async function initCardapio() {
      restaurantId = getRestaurantId();
      if (!restaurantId) {
        document.getElementById('initialLoading').innerHTML = `
          <div style="text-align:center;padding:40px">
            <div style="font-size:3rem;margin-bottom:16px">❌</div>
            <h2>Cardápio não encontrado</h2>
            <p style="color:#636e72;margin-top:8px">Link inválido. Solicite um novo QR Code ao estabelecimento.</p>
          </div>`;
        return;
      }

      try {
        // Carregar dados do estabelecimento
        const userDoc = await db.collection('users').doc(restaurantId).get();
        if (!userDoc.exists) {
          throw new Error('Restaurante não encontrado');
        }

        estabelecimento = userDoc.data().estabelecimento || {};
        renderHeader();

        // Carregar categorias e produtos
        await loadMenuData();

        // Mostrar layout
        document.getElementById('initialLoading').style.display = 'none';
        document.getElementById('cardapioLayout').classList.remove('hidden');

        // Restaurar carrinho do localStorage
        loadCartFromStorage();

      } catch (err) {
        document.getElementById('initialLoading').innerHTML = `
          <div style="text-align:center;padding:40px">
            <div style="font-size:3rem;margin-bottom:16px">❌</div>
            <h2>Erro ao carregar cardápio</h2>
            <p style="color:#636e72;margin-top:8px">${err.message}</p>
          </div>`;
      }
    }

    function renderHeader() {
      document.title = (estabelecimento.nome || 'Cardápio') + ' — Cardápio Digital';
      document.getElementById('restNome').textContent = estabelecimento.nome || 'Cardápio';
      document.getElementById('restEndereco').textContent = estabelecimento.endereco || '';

      if (estabelecimento.logoUrl) {
        document.getElementById('restLogo').src = estabelecimento.logoUrl;
        document.getElementById('restLogo').style.display = 'block';
        document.getElementById('restLogoPlaceholder').style.display = 'none';
      }
    }

    async function loadMenuData() {
      // Carregar categorias
      const catsSnap = await db.collection('users').doc(restaurantId)
        .collection('categorias').orderBy('ordem', 'asc').get();

      allCategories = [];
      catsSnap.forEach(doc => allCategories.push({ id: doc.id, ...doc.data() }));

      // Carregar produtos ativos
      const prodsSnap = await db.collection('users').doc(restaurantId)
        .collection('produtos').where('ativo', '==', true).orderBy('ordem', 'asc').get();

      allProducts = [];
      prodsSnap.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));

      renderCategories();
      renderMenu();
    }

    function renderCategories() {
      const list = document.getElementById('categoriesList');
      list.innerHTML = `<button class="category-chip active" data-cat="todos" onclick="filterByCategory('todos', this)">🍽️ Todos</button>`;

      // Mostrar apenas categorias que têm produtos
      const usedCatIds = [...new Set(allProducts.map(p => p.categoriaId))];
      allCategories.filter(c => usedCatIds.includes(c.id)).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-chip';
        btn.dataset.cat = cat.id;
        btn.textContent = `${cat.emoji || ''} ${cat.nome}`;
        btn.onclick = function() { filterByCategory(cat.id, this); };
        list.appendChild(btn);
      });
    }

    function filterByCategory(catId, btn) {
      currentCategoryFilter = catId;
      document.querySelectorAll('.category-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMenu();
    }

    function renderMenu() {
      const container = document.getElementById('menuContent');

      let filteredProducts = currentCategoryFilter === 'todos'
        ? allProducts
        : allProducts.filter(p => p.categoriaId === currentCategoryFilter);

      if (filteredProducts.length === 0) {
        container.innerHTML = `
          <div class="no-products">
            <div style="font-size:3rem;margin-bottom:12px">🍽️</div>
            <h3>Nenhum produto disponível</h3>
            <p>Selecione outra categoria</p>
          </div>`;
        return;
      }

      // Agrupar por categoria
      if (currentCategoryFilter === 'todos') {
        let html = '';
        allCategories.forEach(cat => {
          const catProducts = filteredProducts.filter(p => p.categoriaId === cat.id);
          if (catProducts.length === 0) return;
          html += `<div class="products-section">
            <h2 class="section-title">${cat.emoji || ''} ${cat.nome}</h2>
            ${catProducts.map(p => renderProductCard(p)).join('')}
          </div>`;
        });

        // Produtos sem categoria
        const noCatProducts = filteredProducts.filter(p => !p.categoriaId);
        if (noCatProducts.length > 0) {
          html += `<div class="products-section">
            <h2 class="section-title">🍽️ Outros</h2>
            ${noCatProducts.map(p => renderProductCard(p)).join('')}
          </div>`;
        }

        container.innerHTML = html;
      } else {
        container.innerHTML = `<div class="products-section">
          ${filteredProducts.map(p => renderProductCard(p)).join('')}
        </div>`;
      }
    }

    function renderProductCard(p) {
      return `
        <div class="product-card" onclick="openProductDetail('${p.id}')">
          ${p.imagemUrl
            ? `<img src="${p.imagemUrl}" class="product-image" alt="${p.nome}" loading="lazy">`
            : `<div class="product-image-placeholder">🍽️</div>`}
          <div class="product-info">
            <div>
              <div class="product-name">${p.nome}</div>
              ${p.descricao ? `<div class="product-description">${p.descricao}</div>` : ''}
            </div>
            <div class="product-footer">
              <span class="product-price">${formatPrice(p.preco)}</span>
              <button class="add-btn" onclick="event.stopPropagation();addToCart('${p.id}', 1)" title="Adicionar ao carrinho">+</button>
            </div>
          </div>
        </div>`;
    }

    // ============================================================
    // CARRINHO
    // ============================================================

    function addToCart(productId, qty = 1) {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;

      const existing = cart.find(item => item.id === productId);
      if (existing) {
        existing.qty += qty;
      } else {
        cart.push({ id: productId, nome: product.nome, preco: product.preco, imagemUrl: product.imagemUrl || '', qty });
      }

      saveCartToStorage();
      updateCartUI();
      showToastCart(product.nome);
    }

    function showToastCart(name) {
      // Mini feedback visual
      const toast = document.createElement('div');
      toast.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#2ecc71;color:white;padding:8px 20px;border-radius:20px;font-size:0.85rem;font-weight:600;z-index:300;animation:slideUp 0.3s ease`;
      toast.textContent = `✅ ${name} adicionado!`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1800);
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      saveCartToStorage();
      updateCartUI();
      renderCartItems();
    }

    function changeCartQty(productId, delta) {
      const item = cart.find(i => i.id === productId);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) {
        removeFromCart(productId);
        return;
      }
      saveCartToStorage();
      updateCartUI();
      renderCartItems();
    }

    function getCartTotal() {
      return cart.reduce((sum, item) => sum + item.preco * item.qty, 0);
    }

    function getCartCount() {
      return cart.reduce((sum, item) => sum + item.qty, 0);
    }

    function updateCartUI() {
      const count = getCartCount();
      const total = getCartTotal();

      const fab = document.getElementById('cartFab');
      if (count > 0) {
        fab.classList.remove('hidden');
        document.getElementById('cartFabCount').textContent = count;
        document.getElementById('cartFabTotal').textContent = formatPrice(total);
      } else {
        fab.classList.add('hidden');
      }

      document.getElementById('cartTotal').textContent = formatPrice(total);
    }

    function renderCartItems() {
      const list = document.getElementById('cartItemsList');
      if (cart.length === 0) {
        list.innerHTML = '';
        return;
      }

      list.innerHTML = cart.map(item => `
        <div class="cart-item">
          ${item.imagemUrl
            ? `<img src="${item.imagemUrl}" class="cart-item-image" alt="${item.nome}">`
            : `<div class="cart-item-image" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:var(--bg)">🍽️</div>`}
          <div class="cart-item-info">
            <div class="cart-item-name">${item.nome}</div>
            <div class="cart-item-price">${formatPrice(item.preco * item.qty)}</div>
          </div>
          <div class="cart-item-controls">
            <button class="qty-btn minus" onclick="changeCartQty('${item.id}', -1)">−</button>
            <span class="qty-value">${item.qty}</span>
            <button class="qty-btn" onclick="changeCartQty('${item.id}', 1)">+</button>
          </div>
        </div>`).join('');
    }

    function openCart() {
      const drawer = document.getElementById('cartDrawer');
      drawer.classList.remove('hidden');
      document.body.style.overflow = 'hidden';

      if (cart.length === 0) {
        document.getElementById('cartEmpty').style.display = 'block';
        document.getElementById('cartWithItems').classList.add('hidden');
        document.getElementById('cartSuccess').classList.add('hidden');
      } else {
        document.getElementById('cartEmpty').style.display = 'none';
        document.getElementById('cartWithItems').classList.remove('hidden');
        document.getElementById('cartSuccess').classList.add('hidden');
        renderCartItems();
        updateCartUI();
      }
    }

    function closeCart() {
      document.getElementById('cartDrawer').classList.add('hidden');
      document.body.style.overflow = '';
    }

    // ============================================================
    // FINALIZAR PEDIDO
    // ============================================================

    async function finalizarPedido() {
      const mesa = document.getElementById('mesaInput').value.trim();
      if (!mesa) {
        document.getElementById('mesaInput').focus();
        document.getElementById('mesaInput').style.borderColor = 'var(--danger)';
        setTimeout(() => document.getElementById('mesaInput').style.borderColor = '', 2000);
        return;
      }

      if (cart.length === 0) return;

      const btn = document.getElementById('finalizarBtn');
      btn.disabled = true;
      btn.textContent = 'Enviando pedido...';

      try {
        const pedido = {
          mesa: parseInt(mesa),
          itens: cart.map(item => ({
            id: item.id,
            nome: item.nome,
            preco: item.preco,
            qty: item.qty,
            subtotal: item.preco * item.qty
          })),
          total: getCartTotal(),
          observacao: document.getElementById('cartObs').value.trim(),
          status: 'novo',
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          restauranteId: restaurantId
        };

        await db.collection('users').doc(restaurantId).collection('pedidos').add(pedido);

        // Mostrar confirmação
        document.getElementById('successMesa').textContent = `Mesa ${mesa}`;
        document.getElementById('successTotal').textContent = formatPrice(pedido.total);
        document.getElementById('cartWithItems').classList.add('hidden');
        document.getElementById('cartSuccess').classList.remove('hidden');

        // Limpar carrinho
        cart = [];
        saveCartToStorage();
        updateCartUI();

      } catch (err) {
        alert('Erro ao enviar pedido: ' + err.message);
        btn.disabled = false;
        btn.textContent = '✅ Fazer Pedido';
      }
    }

    function resetCart() {
      closeCart();
      document.getElementById('cartSuccess').classList.add('hidden');
      document.getElementById('cartEmpty').style.display = 'block';
    }

    // ============================================================
    // MODAL DE DETALHE DO PRODUTO
    // ============================================================

    function openProductDetail(productId) {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;

      detailProduct = product;
      detailQty = 1;

      document.getElementById('detailName').textContent = product.nome;
      document.getElementById('detailDesc').textContent = product.descricao || '';
      document.getElementById('detailPrice').textContent = formatPrice(product.preco);
      document.getElementById('detailQty').textContent = 1;
      updateDetailTotal();

      const img = document.getElementById('detailImage');
      if (product.imagemUrl) {
        img.src = product.imagemUrl;
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }

      document.getElementById('productDetailModal').classList.remove('hidden');
    }

    function closeProductDetail() {
      document.getElementById('productDetailModal').classList.add('hidden');
    }

    function changeDetailQty(delta) {
      detailQty = Math.max(1, detailQty + delta);
      document.getElementById('detailQty').textContent = detailQty;
      updateDetailTotal();
    }

    function updateDetailTotal() {
      if (!detailProduct) return;
      document.getElementById('detailTotalPrice').textContent = formatPrice(detailProduct.preco * detailQty);
    }

    function addFromDetail() {
      if (!detailProduct) return;
      addToCart(detailProduct.id, detailQty);
      closeProductDetail();
    }

    // ============================================================
    // PERSISTÊNCIA DO CARRINHO
    // ============================================================

    function saveCartToStorage() {
      localStorage.setItem(`cart_${restaurantId}`, JSON.stringify(cart));
    }

    function loadCartFromStorage() {
      try {
        const saved = localStorage.getItem(`cart_${restaurantId}`);
        if (saved) {
          cart = JSON.parse(saved);
          // Validar que os produtos ainda existem
          cart = cart.filter(item => allProducts.find(p => p.id === item.id));
          updateCartUI();
        }
      } catch (e) {
        cart = [];
      }
    }

    // Inicializar
    initCardapio();
  </script>
</body>
</html>
